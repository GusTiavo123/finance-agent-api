services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - governance-data:/data/governance
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy volatile-ttl
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  governance-data:
